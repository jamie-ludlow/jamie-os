name: Deploy prebuilt to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: team_YRea8ptKBArL3UQm6at97ieC
      VERCEL_PROJECT_ID: prj_9zBDcsArvVKkka6JFDBIe3MitFpO
      VERCEL_SCOPE: leadrise
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel project settings and env
        run: npx vercel pull --yes --environment=production --scope "$VERCEL_SCOPE" --token "$VERCEL_TOKEN"

      - name: Build locally
        run: npx vercel build --prod --scope "$VERCEL_SCOPE" --token "$VERCEL_TOKEN"

      - name: Deploy prebuilt output
        run: npx vercel deploy --prebuilt --prod --yes --archive=tgz --scope "$VERCEL_SCOPE" --token "$VERCEL_TOKEN"
